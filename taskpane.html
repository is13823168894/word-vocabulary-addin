<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>词汇增强助手</title>
</head>
<body>
    <h1>词汇增强助手</h1>
    <p id="currentDate"></p>

    <p><b>待替换原词</b>（每行一个，点击下方标签可查找定位）</p>
    <textarea id="sourceWords" rows="6" style="width:100%;" placeholder="例如：我觉得&#10;核心指标"></textarea>
    <div id="wordTags" style="margin-top:6px;"></div>

    <p><b>目标替换词</b>（对应行）</p>
    <textarea id="targetWords" rows="6" style="width:100%;" placeholder="例如：本人认为&#10;KPI"></textarea>

    <br><br>
    <button id="highlightBtn">统计并高亮</button>
    <button id="replaceBtn">执行替换</button>
    <button id="clearBtn">清空全部</button>

    <div id="resultArea" style="display:none;margin-top:15px;padding:10px;background:#f8f8f8;border-left:4px solid #2b579a;">
        <b>操作结果：</b>
        <div id="resultContent"></div>
    </div>

    <p id="statusText" style="color:#2b579a;font-size:12px;margin-top:10px;">就绪</p>

    <style>
        body { font-family: 'Microsoft YaHei', sans-serif; padding: 15px; }
        h1 { font-size: 18px; color: #2b579a; margin-bottom: 5px; }
        button { padding: 8px 18px; margin-right: 8px; cursor: pointer; border-radius: 4px; border: none; font-size: 13px; }
        #highlightBtn { background: white; color: #2b579a; border: 2px solid #2b579a; }
        #replaceBtn { background: #2b579a; color: white; }
        #clearBtn { background: white; color: #d32f2f; border: 1px solid #d32f2f; }
        textarea { font-family: Consolas, monospace; font-size: 13px; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .word-tag { display: inline-block; padding: 3px 10px; margin: 3px 4px 3px 0; background: #e8eef6; color: #2b579a; border-radius: 12px; font-size: 12px; cursor: pointer; border: 1px solid #b0c4de; }
        .word-tag:hover { background: #2b579a; color: white; }
        .word-tag.active { background: #2b579a; color: white; }
    </style>

    <!-- office.js 必须放在 body 底部，不能放在 head 里，否则会清空页面 -->
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <script>
    var srcEl, tgtEl, statusEl, resultArea, resultContent, wordTagsEl;

    // 所有初始化必须放在 Office.onReady 里面
    Office.onReady(function(info) {
        srcEl = document.getElementById('sourceWords');
        tgtEl = document.getElementById('targetWords');
        statusEl = document.getElementById('statusText');
        resultArea = document.getElementById('resultArea');
        resultContent = document.getElementById('resultContent');
        wordTagsEl = document.getElementById('wordTags');

        // 绑定按钮
        document.getElementById('highlightBtn').onclick = doHighlight;
        document.getElementById('replaceBtn').onclick = doReplace;
        document.getElementById('clearBtn').onclick = doClear;

        // 自动保存 + 刷新标签
        var saveTimer;
        function autoSave() {
            clearTimeout(saveTimer);
            saveTimer = setTimeout(function() {
                localStorage.setItem('word_addon_source', srcEl.value);
                localStorage.setItem('word_addon_target', tgtEl.value);
                refreshWordTags();
            }, 500);
        }
        srcEl.oninput = autoSave;
        tgtEl.oninput = autoSave;

        // 设置日期
        document.getElementById('currentDate').textContent = new Date().toLocaleDateString('zh-CN', {year:'numeric',month:'long',day:'numeric'});

        // 恢复保存的数据
        var saved1 = localStorage.getItem('word_addon_source');
        var saved2 = localStorage.getItem('word_addon_target');
        if (saved1) srcEl.value = saved1;
        if (saved2) tgtEl.value = saved2;

        // 初始化标签
        refreshWordTags();

        if (info.host === Office.HostType.Word) {
            statusEl.textContent = '就绪';
        } else {
            statusEl.textContent = '请在 Word 中使用';
        }
    });

    // 刷新关键词标签
    function refreshWordTags() {
        var lines = srcEl.value.split('\n').filter(function(l) { return l.trim() !== ''; });
        wordTagsEl.innerHTML = '';
        for (var i = 0; i < lines.length; i++) {
            var word = lines[i].trim();
            var tag = document.createElement('span');
            tag.className = 'word-tag';
            tag.textContent = word;
            tag.setAttribute('data-word', word);
            tag.onclick = (function(w, el) {
                return function() { doFindWord(w, el); };
            })(word, tag);
            wordTagsEl.appendChild(tag);
        }
    }

    // 查找并定位单个关键词
    function doFindWord(word, tagEl) {
        statusEl.textContent = '正在查找 "' + word + '"...';

        // 高亮当前标签
        var allTags = wordTagsEl.getElementsByTagName('span');
        for (var k = 0; k < allTags.length; k++) { allTags[k].className = 'word-tag'; }
        if (tagEl) tagEl.className = 'word-tag active';

        Word.run(function(context) {
            var results = context.document.body.search(word, { matchCase: false, matchWholeWord: false });
            results.load('items');
            return context.sync().then(function() {
                var count = results.items.length;
                if (count > 0) {
                    // 高亮所有匹配项
                    for (var j = 0; j < count; j++) {
                        results.items[j].font.highlightColor = '#FFFF00';
                    }
                    // 选中第一个匹配项，定位到该位置
                    results.items[0].select();
                    return context.sync().then(function() {
                        statusEl.textContent = '"' + word + '" 找到 ' + count + ' 处，已定位到第一处';
                    });
                } else {
                    statusEl.textContent = '"' + word + '" 未找到';
                    if (tagEl) tagEl.className = 'word-tag';
                }
            });
        }).catch(function(error) {
            statusEl.textContent = '查找失败: ' + error.message;
            if (tagEl) tagEl.className = 'word-tag';
        });
    }

    // 清空（不使用 confirm，Office 环境可能阻止弹窗）
    function doClear() {
        srcEl.value = '';
        tgtEl.value = '';
        localStorage.removeItem('word_addon_source');
        localStorage.removeItem('word_addon_target');
        resultArea.style.display = 'none';
        resultContent.innerHTML = '';
        wordTagsEl.innerHTML = '';
        statusEl.textContent = '已清空';
    }

    // 显示结果
    function showResults(results) {
        resultArea.style.display = 'block';
        resultContent.innerHTML = '';
        for (var i = 0; i < results.length; i++) {
            var r = results[i];
            var color = r.ok ? 'green' : 'red';
            var icon = r.ok ? '✓' : '✗';
            resultContent.innerHTML += '<div style="font-size:12px;padding:2px 0;"><span style="color:' + color + ';">' + icon + '</span> ' + r.msg + '</div>';
        }
    }

    // 统计并高亮
    function doHighlight() {
        var lines = srcEl.value.split('\n').filter(function(l) { return l.trim() !== ''; });
        if (lines.length === 0) { statusEl.textContent = '请输入原词'; return; }

        statusEl.textContent = '正在扫描...';
        resultArea.style.display = 'none';

        Word.run(function(context) {
            var body = context.document.body;
            var results = [];
            var searches = [];

            for (var i = 0; i < lines.length; i++) {
                var word = lines[i].trim();
                if (!word) continue;
                var s = body.search(word, { matchCase: false, matchWholeWord: false });
                s.load('items');
                searches.push({ word: word, search: s });
            }

            return context.sync().then(function() {
                for (var i = 0; i < searches.length; i++) {
                    var count = searches[i].search.items.length;
                    if (count > 0) {
                        for (var j = 0; j < count; j++) {
                            searches[i].search.items[j].font.highlightColor = '#FFFF00';
                        }
                        results.push({ ok: true, msg: '"' + searches[i].word + '" 找到 ' + count + ' 处' });
                    } else {
                        results.push({ ok: false, msg: '"' + searches[i].word + '" 未找到' });
                    }
                }
                return context.sync().then(function() {
                    statusEl.textContent = '高亮完成';
                    showResults(results);
                });
            });
        }).catch(function(error) {
            statusEl.textContent = '高亮失败: ' + error.message;
        });
    }

    // 执行替换
    function doReplace() {
        var srcLines = srcEl.value.split('\n').filter(function(l) { return l.trim() !== ''; });
        var tgtLines = tgtEl.value.split('\n').filter(function(l) { return l.trim() !== ''; });
        if (srcLines.length === 0) { statusEl.textContent = '请输入原词'; return; }
        if (tgtLines.length === 0) { statusEl.textContent = '请输入替换词'; return; }
        if (srcLines.length !== tgtLines.length) { statusEl.textContent = '数量不匹配'; return; }

        statusEl.textContent = '正在替换...';
        resultArea.style.display = 'none';

        Word.run(function(context) {
            var body = context.document.body;
            var results = [];
            var searches = [];

            for (var i = 0; i < srcLines.length; i++) {
                var word = srcLines[i].trim();
                if (!word) { searches.push(null); continue; }
                var s = body.search(word, { matchCase: false, matchWholeWord: false });
                s.load('items');
                searches.push({ source: word, target: tgtLines[i].trim(), search: s });
            }

            return context.sync().then(function() {
                for (var i = 0; i < searches.length; i++) {
                    if (!searches[i]) continue;
                    var count = searches[i].search.items.length;
                    if (count > 0) {
                        for (var j = count - 1; j >= 0; j--) {
                            searches[i].search.items[j].insertText(searches[i].target, Word.InsertLocation.replace);
                        }
                        results.push({ ok: true, msg: '"' + searches[i].source + '" → "' + searches[i].target + '" (' + count + '处)' });
                    } else {
                        results.push({ ok: false, msg: '"' + searches[i].source + '" 未找到' });
                    }
                }
                return context.sync().then(function() {
                    var ok = 0;
                    for (var i = 0; i < results.length; i++) { if (results[i].ok) ok++; }
                    statusEl.textContent = '替换完成 (' + ok + '/' + results.length + ')';
                    showResults(results);
                });
            });
        }).catch(function(error) {
            statusEl.textContent = '替换失败: ' + error.message;
        });
    }

    </script>
</body>
</html>
