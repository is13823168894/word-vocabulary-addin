<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>词汇增强助手</title>
</head>
<body>
    <div class="tab-nav">
        <button class="tab-btn active" id="tabBtnWord" onclick="showTab('word')">词汇替换</button>
        <button class="tab-btn" id="tabBtnRegex" onclick="showTab('regex')">正则工具</button>
    </div>

    <!-- ========== 词汇替换面板 ========== -->
    <div id="tabWord">
        <p><b>待替换原词</b></p>
        <textarea id="sourceWords" rows="6" style="width:100%;" placeholder="例如：我觉得&#10;核心指标"></textarea>
        <div id="wordTags" style="margin-top:3px;"></div>
        <div id="navBtns" style="margin-top:3px;display:none;">
            <button id="prevBtn">&#9650; 上一个</button>
            <button id="nextBtn">&#9660; 下一个</button>
            <span id="navInfo" style="font-size:12px;color:#666;margin-left:6px;"></span>
        </div>

        <p><b>目标替换词</b>（对应行）</p>
        <textarea id="targetWords" rows="6" style="width:100%;" placeholder="例如：本人认为&#10;KPI"></textarea>

        <br><br>
        <button id="highlightBtn">统计并高亮</button>
        <button id="replaceBtn">执行替换</button>
        <button id="clearHLBtn">清除高亮</button>
        <button id="clearBtn">清空全部</button>

        <div id="resultArea" style="display:none;margin-top:3px;padding:10px;background:#f8f8f8;border-left:4px solid #2b579a;">
            <b>操作结果：</b>
            <div id="resultContent"></div>
        </div>
    </div>

    <!-- ========== 正则工具面板 ========== -->
    <div id="tabRegex" style="display:none;">
        <div class="regex-section">
            <b>范围设置</b>
            <div class="range-group">
                <label><input type="radio" name="regexRange" value="all" checked> 全主文档</label>
                <label><input type="radio" name="regexRange" value="page"> 当前页面</label>
                <label><input type="radio" name="regexRange" value="selection"> 选择区域</label>
            </div>
        </div>

        <div class="regex-section">
            <b>正则表达式</b>
            <input type="text" id="regexPattern" style="width:100%;font-family:Consolas,monospace;" placeholder="例如：\d+" />
        </div>

        <div class="regex-section">
            <b>替换为</b>
            <input type="text" id="regexReplace" style="width:100%;font-family:Consolas,monospace;" placeholder="支持 $1 $2 等捕获组" />
        </div>

        <div class="regex-btns">
            <button id="regexFindBtn">查找</button>
            <button id="regexReplaceBtn">谨慎替换</button>
            <button id="regexSelectAllBtn">全选</button>
            <button id="regexPrevBtn">上一项</button>
            <button id="regexNextBtn">下一项</button>
        </div>

        <div id="regexResultArea" style="margin-top:6px;max-height:240px;overflow-y:auto;border:1px solid #ddd;border-radius:4px;">
            <table id="regexResultTable" style="width:100%;border-collapse:collapse;font-size:12px;">
                <thead>
                    <tr style="background:#2b579a;color:#fff;">
                        <th style="padding:5px;width:35px;">序号</th>
                        <th style="padding:5px;">匹配内容</th>
                        <th style="padding:5px;">替换内容</th>
                        <th style="padding:5px;width:45px;">页码</th>
                    </tr>
                </thead>
                <tbody id="regexResultBody">
                    <tr><td colspan="4" style="padding:15px;text-align:center;color:#999;">请输入正则表达式后点击"查找"</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <p id="statusText" style="color:#2b579a;font-size:12px;margin-top:3px;">就绪</p>

    <style>
        body { font-family: 'Microsoft YaHei', sans-serif; padding: 15px; }
        h1 { font-size: 18px; color: #2b579a; margin-bottom: 5px; }
        button { padding: 8px 18px; margin-right: 8px; cursor: pointer; border-radius: 4px; border: none; font-size: 13px; }
        #highlightBtn { background: white; color: #2b579a; border: 2px solid #2b579a; }
        #replaceBtn { background: #2b579a; color: white; }
        #clearBtn { background: white; color: #d32f2f; border: 1px solid #d32f2f; }
        #clearHLBtn { background: white; color: #e65100; border: 1px solid #e65100; }
        #prevBtn, #nextBtn { padding: 4px 12px; margin-right: 4px; cursor: pointer; border-radius: 4px; border: 1px solid #2b579a; background: white; color: #2b579a; font-size: 12px; }
        #prevBtn:hover, #nextBtn:hover { background: #2b579a; color: white; }
        textarea, input { font-family: Consolas, monospace; font-size: 13px; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .word-tag { display: inline-block; padding: 3px 10px; margin: 3px 4px 3px 0; border-radius: 12px; font-size: 12px; cursor: pointer; border: 1px solid #b0c4de; color: #fff; }
        .word-tag:hover { opacity: 0.8; }
        .word-tag.active { outline: 2px solid #333; outline-offset: 1px; }

        /* Tab */
        .tab-nav { margin-bottom: 12px; border-bottom: 2px solid #ddd; }
        .tab-btn { background: #f0f0f0; color: #555; border: none; border-radius: 4px 4px 0 0; padding: 6px 16px; margin-right: 4px; cursor: pointer; font-size: 13px; }
        .tab-btn.active { background: #2b579a; color: #fff; }
        .tab-btn:hover { background: #ddd; }
        .tab-btn.active:hover { background: #2b579a; }

        /* 正则工具 */
        .regex-section { margin-bottom: 10px; }
        .regex-section b { display: block; margin-bottom: 3px; font-size: 13px; color: #333; }
        .range-group { display: flex; gap: 12px; font-size: 12px; }
        .range-group label { cursor: pointer; }
        .regex-btns { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
        .regex-btns button { padding: 5px 12px; font-size: 12px; background: white; border: 1px solid #2b579a; color: #2b579a; margin-right: 0; }
        .regex-btns button:hover { background: #2b579a; color: white; }
        #regexReplaceBtn { border-color: #e65100; color: #e65100; }
        #regexReplaceBtn:hover { background: #e65100; color: white; }

        /* 正则结果表格 */
        #regexResultTable th { text-align: left; font-weight: normal; font-size: 12px; }
        #regexResultTable td { padding: 4px 5px; border-bottom: 1px solid #eee; }
        #regexResultTable tbody tr:hover { background: #f0f7ff; cursor: pointer; }
        #regexResultTable tbody tr.selected { background: #2b579a !important; color: #fff; }
        #regexResultTable tbody tr.replaced { text-decoration: line-through; color: #999; }
        #regexResultTable tbody tr.replaced td { color: #999; }
        #regexResultTable tbody tr.selected td { color: #fff; }
    </style>

    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <script>
    (function() {
        var srcEl, tgtEl, statusEl, resultArea, resultContent, wordTagsEl;

        // 导航状态
        var navState = {
            word: '',
            colorIndex: 0,
            currentPos: 0,
            totalCount: 0
        };

        var HIGHLIGHT_COLORS = [
            '#FFFF00', '#00FFFF', '#FF00FF', '#00FF00',
            '#FF6600', '#9933FF', '#FF0000', '#00CCFF',
            '#FFCC00', '#66FF66', '#FF99CC', '#CC99FF'
        ];

        function getColor(index) {
            return HIGHLIGHT_COLORS[index % HIGHLIGHT_COLORS.length];
        }

        // ========== Tab 切换 ==========
        function showTab(name) {
            document.getElementById('tabWord').style.display = name === 'word' ? 'block' : 'none';
            document.getElementById('tabRegex').style.display = name === 'regex' ? 'block' : 'none';
            document.getElementById('tabBtnWord').className = name === 'word' ? 'tab-btn active' : 'tab-btn';
            document.getElementById('tabBtnRegex').className = name === 'regex' ? 'tab-btn active' : 'tab-btn';
            statusEl.textContent = '就绪';
        }

        // ========== 正则工具状态 ==========
        var regexState = {
            matches: [],
            currentIndex: -1,
            isReplaced: []
        };

        function getRegexRangeType() {
            var radios = document.getElementsByName('regexRange');
            for (var i = 0; i < radios.length; i++) {
                if (radios[i].checked) return radios[i].value;
            }
            return 'all';
        }

        // ========== Office.js 初始化 ==========
        Office.onReady(function(info) {
            try {
                srcEl = document.getElementById('sourceWords');
                tgtEl = document.getElementById('targetWords');
                statusEl = document.getElementById('statusText');
                resultArea = document.getElementById('resultArea');
                resultContent = document.getElementById('resultContent');
                wordTagsEl = document.getElementById('wordTags');

                // 绑定词汇替换按钮
                document.getElementById('highlightBtn').onclick = doHighlight;
                document.getElementById('replaceBtn').onclick = doReplace;
                document.getElementById('clearHLBtn').onclick = doClearHighlight;
                document.getElementById('clearBtn').onclick = doClear;
                document.getElementById('prevBtn').onclick = doNavigatePrev;
                document.getElementById('nextBtn').onclick = doNavigateNext;

                // 绑定正则工具按钮
                document.getElementById('regexFindBtn').onclick = doRegexFind;
                document.getElementById('regexReplaceBtn').onclick = doRegexReplace;
                document.getElementById('regexSelectAllBtn').onclick = doRegexSelectAll;
                document.getElementById('regexPrevBtn').onclick = doRegexPrev;
                document.getElementById('regexNextBtn').onclick = doRegexNext;

                // 自动保存
                var saveTimer;
                function autoSave() {
                    clearTimeout(saveTimer);
                    saveTimer = setTimeout(function() {
                        localStorage.setItem('word_addon_source', srcEl.value);
                        localStorage.setItem('word_addon_target', tgtEl.value);
                        refreshWordTags();
                    }, 500);
                }
                srcEl.oninput = autoSave;
                tgtEl.oninput = autoSave;

                // 恢复保存的数据
                var saved1 = localStorage.getItem('word_addon_source');
                var saved2 = localStorage.getItem('word_addon_target');
                if (saved1) srcEl.value = saved1;
                if (saved2) tgtEl.value = saved2;

                refreshWordTags();

                if (info.host === Office.HostType.Word) {
                    statusEl.textContent = '就绪';
                } else {
                    statusEl.textContent = '请在 Word 中使用';
                }
            } catch (e) {
                console.error('初始化错误:', e);
            }
        });

        // ============================================================
        // 词汇替换功能
        // ============================================================

        function refreshWordTags() {
            var lines = srcEl.value.split('\n').filter(function(l) { return l.trim() !== ''; });
            wordTagsEl.innerHTML = '';
            for (var i = 0; i < lines.length; i++) {
                var word = lines[i].trim();
                var color = getColor(i);
                var tag = document.createElement('span');
                tag.className = 'word-tag';
                tag.textContent = word;
                tag.style.backgroundColor = color;
                tag.style.borderColor = color;
                tag.style.color = '#fff';
                tag.onclick = (function(w, idx) {
                    return function() { doFindWord(w, idx); };
                })(word, i);
                wordTagsEl.appendChild(tag);
            }
        }

        function doFindWord(word, colorIndex) {
            statusEl.textContent = '正在查找 "' + word + '"...';
            var allTags = wordTagsEl.getElementsByTagName('span');
            for (var k = 0; k < allTags.length; k++) { allTags[k].className = 'word-tag'; }
            allTags[colorIndex].className = 'word-tag active';

            var hlColor = getColor(colorIndex);
            Word.run(function(context) {
                var results = context.document.body.search(word, { matchCase: false, matchWholeWord: false });
                results.load('items');
                return context.sync().then(function() {
                    var count = results.items.length;
                    if (count > 0) {
                        for (var j = 0; j < count; j++) {
                            results.items[j].font.highlightColor = hlColor;
                        }
                        results.items[0].select();
                        return context.sync().then(function() {
                            navState.word = word;
                            navState.colorIndex = colorIndex;
                            navState.currentPos = 0;
                            navState.totalCount = count;
                            updateNavUI();
                            statusEl.textContent = '"' + word + '" 找到 ' + count + ' 处';
                        });
                    } else {
                        navState.word = '';
                        navState.totalCount = 0;
                        updateNavUI();
                        statusEl.textContent = '"' + word + '" 未找到';
                        allTags[colorIndex].className = 'word-tag';
                    }
                });
            }).catch(function(error) {
                statusEl.textContent = '查找失败: ' + error.message;
            });
        }

        function updateNavUI() {
            var navBtns = document.getElementById('navBtns');
            var navInfo = document.getElementById('navInfo');
            if (navState.totalCount > 0) {
                navBtns.style.display = 'block';
                navInfo.textContent = (navState.currentPos + 1) + ' / ' + navState.totalCount;
            } else {
                navBtns.style.display = 'none';
            }
        }

        function doNavigatePrev() {
            if (navState.totalCount === 0) return;
            navState.currentPos = (navState.currentPos - 1 + navState.totalCount) % navState.totalCount;
            navigateToPos();
        }

        function doNavigateNext() {
            if (navState.totalCount === 0) return;
            navState.currentPos = (navState.currentPos + 1) % navState.totalCount;
            navigateToPos();
        }

        function navigateToPos() {
            Word.run(function(context) {
                var results = context.document.body.search(navState.word, { matchCase: false, matchWholeWord: false });
                results.load('items');
                return context.sync().then(function() {
                    if (results.items.length > navState.currentPos) {
                        results.items[navState.currentPos].select();
                        updateNavUI();
                    }
                });
            });
        }

        function doClearHighlight() {
            statusEl.textContent = '正在清除...';
            Word.run(function(context) {
                context.document.body.getRange().font.highlightColor = null;
                return context.sync().then(function() {
                    statusEl.textContent = '已清除高亮';
                });
            });
        }

        function doClear() {
            srcEl.value = '';
            tgtEl.value = '';
            localStorage.removeItem('word_addon_source');
            localStorage.removeItem('word_addon_target');
            wordTagsEl.innerHTML = '';
            statusEl.textContent = '已清空';
        }

        function doHighlight() {
            var lines = srcEl.value.split('\n').filter(function(l) { return l.trim() !== ''; });
            if (lines.length === 0) { statusEl.textContent = '请输入原词'; return; }
            statusEl.textContent = '正在扫描...';

            Word.run(function(context) {
                var body = context.document.body;
                var results = [];
                var searches = [];
                for (var i = 0; i < lines.length; i++) {
                    var word = lines[i].trim();
                    if (!word) continue;
                    var s = body.search(word, { matchCase: false, matchWholeWord: false });
                    s.load('items');
                    searches.push({ word: word, search: s, colorIndex: i, color: getColor(i) });
                }
                return context.sync().then(function() {
                    for (var i = 0; i < searches.length; i++) {
                        var count = searches[i].search.items.length;
                        if (count > 0) {
                            for (var j = 0; j < count; j++) {
                                searches[i].search.items[j].font.highlightColor = searches[i].color;
                            }
                            results.push('"' + searches[i].word + '" 找到 ' + count + ' 处');
                        } else {
                            results.push('"' + searches[i].word + '" 未找到');
                        }
                    }
                    return context.sync().then(function() {
                        statusEl.textContent = '高亮完成';
                        resultArea.style.display = 'block';
                        resultContent.innerHTML = results.map(function(r) {
                            return '<div style="font-size:12px;padding:2px 0;">' + r + '</div>';
                        }).join('');
                    });
                });
            });
        }

        function doReplace() {
            var srcLines = srcEl.value.split('\n').filter(function(l) { return l.trim() !== ''; });
            var tgtLines = tgtEl.value.split('\n').filter(function(l) { return l.trim() !== ''; });
            if (srcLines.length === 0) { statusEl.textContent = '请输入原词'; return; }
            if (tgtLines.length === 0) { statusEl.textContent = '请输入替换词'; return; }
            if (srcLines.length !== tgtLines.length) { statusEl.textContent = '数量不匹配'; return; }
            statusEl.textContent = '正在替换...';

            Word.run(function(context) {
                var body = context.document.body;
                for (var i = 0; i < srcLines.length; i++) {
                    var word = srcLines[i].trim();
                    if (!word) continue;
                    var s = body.search(word, { matchCase: false, matchWholeWord: false });
                    s.load('items');
                    return context.sync().then(function() {
                        for (var j = s.items.length - 1; j >= 0; j--) {
                            s.items[j].insertText(tgtLines[i].trim(), Word.InsertLocation.replace);
                        }
                    });
                }
                return context.sync().then(function() {
                    statusEl.textContent = '替换完成';
                });
            });
        }

        // ============================================================
        // 正则工具功能
        // ============================================================

        function doRegexFind() {
            var pattern = document.getElementById('regexPattern').value;
            if (!pattern) { statusEl.textContent = '请输入正则'; return; }

            var regex;
            try {
                regex = new RegExp(pattern, 'g');
            } catch (e) {
                statusEl.textContent = '正则错误: ' + e.message;
                return;
            }

            statusEl.textContent = '正在搜索...';
            regexState.matches = [];
            regexState.currentIndex = -1;
            regexState.isReplaced = [];

            Word.run(function(context) {
                var searchArea = getRegexRangeType() === 'selection'
                    ? context.document.getSelection()
                    : context.document.body;

                var paragraphs = searchArea.paragraphs;
                paragraphs.load('text');
                return context.sync().then(function() {
                    var allMatches = [];
                    for (var p = 0; p < paragraphs.items.length; p++) {
                        var paraText = paragraphs.items[p].text;
                        var match;
                        regex.lastIndex = 0;
                        while ((match = regex.exec(paraText)) !== null) {
                            allMatches.push({
                                paraIndex: p,
                                matchText: match[0],
                                groups: match.slice(1)
                            });
                            if (match.index === regex.lastIndex) regex.lastIndex++;
                        }
                    }
                    regexState.matches = allMatches;
                    regexState.isReplaced = new Array(allMatches.length).fill(false);
                    showRegexResults();
                    statusEl.textContent = '找到 ' + allMatches.length + ' 处';
                });
            }).catch(function(error) {
                statusEl.textContent = '搜索失败: ' + error.message;
            });
        }

        function showRegexResults() {
            var tbody = document.getElementById('regexResultBody');
            var replaceText = document.getElementById('regexReplace').value;
            tbody.innerHTML = '';

            if (regexState.matches.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="padding:15px;text-align:center;color:#999;">无匹配</td></tr>';
                return;
            }

            for (var i = 0; i < regexState.matches.length; i++) {
                var m = regexState.matches[i];
                var tr = document.createElement('tr');
                if (i === regexState.currentIndex) tr.className = 'selected';
                if (regexState.isReplaced[i]) tr.className = (tr.className ? tr.className + ' ' : '') + 'replaced';

                var preview = replaceText || '(无)';
                for (var g = 0; g < m.groups.length; g++) {
                    preview = preview.replace(new RegExp('\\$' + (g + 1), 'g'), m.groups[g] || '');
                }

                tr.innerHTML = '<td>' + (i + 1) + '</td>' +
                    '<td>' + escapeHtml(m.matchText) + '</td>' +
                    '<td>' + escapeHtml(preview) + '</td>' +
                    '<td>-</td>';
                tr.onclick = (function(idx) { return function() { regexState.currentIndex = idx; showRegexResults(); }; })(i);
                tbody.appendChild(tr);
            }
        }

        function escapeHtml(text) {
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function doRegexPrev() {
            if (regexState.matches.length === 0) return;
            regexState.currentIndex = (regexState.currentIndex - 1 + regexState.matches.length) % regexState.matches.length;
            showRegexResults();
            goToRegexMatch(regexState.currentIndex);
        }

        function doRegexNext() {
            if (regexState.matches.length === 0) return;
            regexState.currentIndex = (regexState.currentIndex + 1) % regexState.matches.length;
            showRegexResults();
            goToRegexMatch(regexState.currentIndex);
        }

        function goToRegexMatch(index) {
            if (index < 0 || index >= regexState.matches.length) return;
            var m = regexState.matches[index];

            Word.run(function(context) {
                var searchArea = getRegexRangeType() === 'selection'
                    ? context.document.getSelection()
                    : context.document.body;

                var paragraphs = searchArea.paragraphs;
                paragraphs.load('items');
                return context.sync().then(function() {
                    if (m.paraIndex < paragraphs.items.length) {
                        var sr = paragraphs.items[m.paraIndex].search(m.matchText, { matchCase: true });
                        sr.load('items');
                        return context.sync().then(function() {
                            if (sr.items.length > 0) {
                                sr.items[0].select();
                                statusEl.textContent = '第 ' + (index + 1) + ' 项';
                            }
                        });
                    }
                });
            });
        }

        function doRegexSelectAll() {
            if (regexState.matches.length === 0) { statusEl.textContent = '无匹配'; return; }
            statusEl.textContent = '高亮中...';

            Word.run(function(context) {
                var searchArea = getRegexRangeType() === 'selection'
                    ? context.document.getSelection()
                    : context.document.body;

                var paragraphs = searchArea.paragraphs;
                paragraphs.load('items');
                return context.sync().then(function() {
                    for (var i = 0; i < regexState.matches.length; i++) {
                        var m = regexState.matches[i];
                        if (m.paraIndex < paragraphs.items.length) {
                            var sr = paragraphs.items[m.paraIndex].search(m.matchText, { matchCase: true });
                            sr.load('items');
                            return context.sync().then(function() {
                                if (sr.items.length > 0) sr.items[0].font.highlightColor = '#FFFF00';
                            });
                        }
                    }
                    return context.sync().then(function() {
                        statusEl.textContent = '已高亮 ' + regexState.matches.length + ' 处';
                    });
                });
            });
        }

        function doRegexReplace() {
            var pattern = document.getElementById('regexPattern').value;
            var replaceText = document.getElementById('regexReplace').value;
            if (!pattern || regexState.matches.length === 0) {
                statusEl.textContent = '请先执行查找';
                return;
            }
            statusEl.textContent = '替换中...';

            var count = 0;
            function replaceNext(idx) {
                if (idx < 0) {
                    statusEl.textContent = '已替换 ' + count + ' 处';
                    return;
                }
                var m = regexState.matches[idx];
                var replacement = replaceText;
                for (var g = 0; g < m.groups.length; g++) {
                    replacement = replacement.replace(new RegExp('\\$' + (g + 1), 'g'), m.groups[g] || '');
                }

                Word.run(function(context) {
                    var searchArea = getRegexRangeType() === 'selection'
                        ? context.document.getSelection()
                        : context.document.body;

                    var paragraphs = searchArea.paragraphs;
                    paragraphs.load('items');
                    return context.sync().then(function() {
                        if (m.paraIndex < paragraphs.items.length) {
                            var sr = paragraphs.items[m.paraIndex].search(m.matchText, { matchCase: true });
                            sr.load('items');
                            return context.sync().then(function() {
                                if (sr.items.length > 0) {
                                    sr.items[0].insertText(replacement, Word.InsertLocation.replace);
                                    count++;
                                    regexState.isReplaced[idx] = true;
                                }
                                replaceNext(idx - 1);
                            });
                        } else {
                            replaceNext(idx - 1);
                        }
                    });
                });
            }
            replaceNext(regexState.matches.length - 1);
        }
    })();
    </script>
